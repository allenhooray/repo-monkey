name: Release to GitHub Releases

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0)'
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "ZIP_FILE=repo-monkey-v$VERSION.zip" >> $GITHUB_OUTPUT

      - name: Verify tag matches package.json version
        run: |
          TAG_NAME="${{ github.ref_name }}"
          PKG_VERSION="${{ steps.get_version.outputs.VERSION }}"
          EXPECTED_TAG="v$PKG_VERSION"
          if [ "$TAG_NAME" != "$EXPECTED_TAG" ]; then
            echo "::error::Tag '$TAG_NAME' does not match package.json version '$EXPECTED_TAG'"
            exit 1
          fi
          echo "Tag '$TAG_NAME' matches package.json version."

      - name: Type check
        run: pnpm run type-check

      - name: Build and package
        run: pnpm run build:zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.get_version.outputs.ZIP_FILE }}
          tag_name: ${{ github.ref_name }}
          name: Release v${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
